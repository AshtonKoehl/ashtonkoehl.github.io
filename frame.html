<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ashton Koehl</title>
  <meta name="description" content="Personal About Me page for Ashton Koehl." />

  <!-- Social preview (absolute URLs; put preview.png in the repo root) -->
  <meta property="og:title" content="Ashton Koehl" />
  <meta property="og:description" content="Learn more about Ashton Koehl." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://ashtonkoehl.github.io/static-site/preview.png" />
  <meta name="theme-color" content="#cc0000" />

  <!-- Optional Farcaster preview image (no buttons/actions) -->
  <meta property="fc:frame" content="vNext" />
  <meta property="fc:frame:image" content="https://ashtonkoehl.github.io/static-site/preview.png" />

  <!-- Ensure relative links resolve under /static-site/ if you add assets later -->
  <base href="/static-site/">

  <style>
    :root {
      --bg: #000000;     /* black */
      --fg: #ffffff;     /* white text */
      --accent: #cc0000; /* red */
    }
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    main {
      max-width: 680px;
      width: min(92vw, 680px);
      padding: 36px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(204,0,0,0.4);
      box-shadow: 0 10px 28px rgba(204,0,0,0.28);
      text-align: center;
    }
    h1 {
      margin: 0 0 14px;
      font-size: 2.4rem;
      color: var(--accent);
      letter-spacing: .3px;
    }
    p {
      margin: 0;
      font-size: 1.12rem;
      line-height: 1.7;
      color: #f0f0f0;
    }
  </style>
</head>
<body>
  <main role="main">
    <h1>Ashton Koehl</h1>
    <p>
      Hi, I’m Ashton — a builder and problem-solver who loves tech, gaming, and creating projects that are useful and fun.
      I’m currently exploring ways to blend development, design, and community into simple experiences that feel great to use.
    </p>
  </main>
</body>
</html>
