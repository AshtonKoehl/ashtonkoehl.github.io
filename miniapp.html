<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ashton Koehl</title>

  <!-- Mini App Embed for casts -->
  <meta name="fc:miniapp" content='{
    "version":"1",
    "imageUrl":"https://AshtonKoehl.github.io/farcaster-miniapp/card.png",
    "button":{"title":"Open Profile","action":{
      "type":"launch_frame",
      "name":"About Ashton",
      "url":"https://AshtonKoehl.github.io/farcaster-miniapp/",
      "splashImageUrl":"https://AshtonKoehl.github.io/farcaster-miniapp/icon.png",
      "splashBackgroundColor":"#7047EB"
    }}
  }' />

  <meta property="og:title" content="Ashton Koehl" />
  <meta property="og:description" content="Tap to open my mini app." />
  <meta property="og:image" content="https://AshtonKoehl.github.io/farcaster-miniapp/card.png" />
  <meta name="theme-color" content="#7047EB" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f1220;
      color: #fff;
      font: 16px/1.6 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    .card {
      width: min(92vw, 600px);
      padding: 40px;
      border-radius: 18px;
      background: #1a1f3a;
      border: 1px solid #2a2f54;
      text-align: center;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 2rem;
    }
    p {
      margin: 0 0 12px;
      color: #cfd1ff;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Ashton Koehl</h1>
    <p>Hello 👋 I’m Ashton. Welcome to my mini app homepage!</p>
    <p>I’m passionate about computer science, gaming, and building cool projects.</p>
    <p>Thanks for stopping by 🚀</p>
  </main>

  <!-- Call ready() when client loads -->
  <script type="module">
    let sdk;
    try {
      ({ sdk } = await import("https://esm.sh/@farcaster/miniapp-sdk"));
      await sdk.actions.ready(); // hides splash screen in Farcaster clients
    } catch (e) {
      console.warn("Miniapp SDK not available", e);
    }
  </script>
</body>
</html>
